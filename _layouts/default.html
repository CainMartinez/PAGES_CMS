<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>window.__baseurl = '{{ site.baseurl }}';</script>
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <strong>{{ site.title }}</strong>
      {% if site.description %}<span>{{ site.description }}</span>{% endif %}
    </div>
  </footer>

  <script>
    var __base = window.__baseurl;
    if (__base && __base !== '') {
      document.querySelectorAll('img').forEach(function(img) {
        var src = img.getAttribute('src');
        if (src && src.charAt(0) === '/' && src.indexOf(__base) !== 0) {
          img.setAttribute('src', __base + src);
        }
      });
    }
  </script>

</body>
</html>
