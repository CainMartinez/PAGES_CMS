title: Documentación
description: Base de conocimiento del equipo
baseurl: /PAGES_CMS
url: https://cainmartinez.github.io

# Solo el título del sitio aparece en el header (sin links de nav extra)
header_pages: []

collections:
  docs:
    output: true
    permalink: /docs/:name/

defaults:
  # Todos los archivos dentro de docs/ usan el layout doc
  - scope:
      path: "docs"
    values:
      layout: doc
